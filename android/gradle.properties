org.gradle.jvmargs=-Xmx2048M -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
# Machine has 8 GB RAM — keep the daemon heap modest so lint/AAPT/Kotlin worker
# processes have room and don't get OOM-killed ("lint return value -1").
org.gradle.workers.max=2
android.useAndroidX=true
android.enableJetifier=true
# Keep resource NAMES intact in release. AGP's resource optimizer collapses
# resource names, which breaks looking up the custom notification sound
# (res/raw/hca_notify) by name at runtime — it would silently fall back to the
# default tone. Disabling this keeps the name resolvable.
android.enableResourceOptimizations=false
